<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帝王棉花骰子</title>
    <!-- 引入外部樣式表，隔離視覺設計 -->
    <link rel="stylesheet" href="style.css">
    <!-- 引入外部 JavaScript 檔案，並使用 defer 確保在 HTML 解析完成後執行，隔離互動邏輯 -->
    <script src="script.js" defer></script>
</head>

<body>
    <main>
        <header>
            <h1>帝王棉花骰子</h1>
        </header>

        <section id="input-section">
            <div class="form-group">
                <label>骰子種類：</label>
                <div id="dice-grid">
                    <button class="dice-option" data-sides="4">
                        <svg class="dice-icon" viewBox="0 0 100 100">
                            <polygon points="50,15 90,85 10,85" fill="none" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
                            <path d="M50 15 L50 65 L10 85 M50 65 L90 85" fill="none" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
                        </svg>
                        <span>D4</span>
                    </button>
                    <button class="dice-option active" data-sides="6">
                        <svg class="dice-icon" viewBox="0 0 100 100">
                            <polygon points="50,10 90,30 90,70 50,90 10,70 10,30" fill="none" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
                            <polyline points="50,50 50,90" fill="none" stroke="currentColor" stroke-width="5"/>
                            <polyline points="50,50 10,30" fill="none" stroke="currentColor" stroke-width="5"/>
                            <polyline points="50,50 90,30" fill="none" stroke="currentColor" stroke-width="5"/>
                        </svg>
                        <span>D6</span>
                    </button>
                    <button class="dice-option" data-sides="8">
                        <svg class="dice-icon" viewBox="0 0 100 100">
                            <polygon points="50,10 85,50 50,90 15,50" fill="none" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
                            <path d="M15 50 L85 50 M50 10 L30 50 L50 90 M50 10 L70 50 L50 90" fill="none" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
                        </svg>
                        <span>D8</span>
                    </button>
                    <button class="dice-option" data-sides="10">
                        <svg class="dice-icon" viewBox="0 0 100 100">
                            <polygon points="50,10 90,40 50,90 10,40" fill="none" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
                            <path d="M10 40 L50 55 L90 40 M50 55 L50 90 M50 10 L30 45 L50 55 M50 10 L70 45 L50 55" fill="none" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
                        </svg>
                        <span>D10</span>
                    </button>
                    <button class="dice-option" data-sides="12">
                        <svg class="dice-icon" viewBox="0 0 100 100">
                            <polygon points="50,10 85,35 70,85 30,85 15,35" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
                            <path d="M50 25 L70 45 L60 70 L40 70 L30 45 Z" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
                            <path d="M50 10 L50 25 M85 35 L70 45 M70 85 L60 70 M30 85 L40 70 M15 35 L30 45" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
                        </svg>
                        <span>D12</span>
                    </button>
                    <button class="dice-option" data-sides="20">
                        <svg class="dice-icon" viewBox="0 0 100 100">
                            <polygon points="50,10 90,30 90,75 50,95 10,75 10,30" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
                            <polygon points="50,25 75,65 25,65" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
                            <path d="M50 10 L50 25 M90 30 L75 65 L90 75 M10 30 L25 65 L10 75 M50 95 L75 65 M50 95 L25 65 M10 30 L50 25 L90 30" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/>
                        </svg>
                        <span>D20</span>
                    </button>
                    <button class="dice-option" data-sides="100">
                        <svg class="dice-icon" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" stroke-width="4"/>
                            <ellipse cx="50" cy="50" rx="20" ry="40" fill="none" stroke="currentColor" stroke-width="4"/>
                            <ellipse cx="50" cy="50" rx="40" ry="15" fill="none" stroke="currentColor" stroke-width="4"/>
                        </svg>
                        <span>D100</span>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="dice-count">擲骰數量：</label>
                <!-- 設定 min="1" 避免無效的零或負數輸入 -->
                <input type="number" id="dice-count" min="1" value="1" required>
            </div>

            <div class="form-group">
                <label for="formula-input">結算公式 (總值以 x 表示)：</label>
                <input type="text" id="formula-input" placeholder="例如：(2*x+6)*5">
            </div>
            <button type="button" id="roll-button">擲骰與結算</button>
        </section>

        <section id="result-section">
            <div class="result-group">
                <h2>擲骰結果</h2>
                <p>各骰數值：<span id="raw-results">-</span></p>
                <p>擲骰總值 (x)：<span id="total-value">-</span></p>
            </div>
            <div class="result-group">
                <h2>最終結算值</h2>
                <p id="final-result">-</p>
            </div>
        </section>
    </main>
</body>

</html>
